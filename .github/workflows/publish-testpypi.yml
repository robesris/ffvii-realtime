name: Publish to TestPyPI

# Rehearsal publish to TestPyPI via Trusted Publishing (OIDC) — no tokens.
# Manual only: Actions tab -> "Publish to TestPyPI" -> Run workflow.
# Requires a separate pending publisher on https://test.pypi.org with
# environment name "testpypi" (same owner/repo, workflow "publish-testpypi.yml").
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi      # must match the GitHub environment named in the TestPyPI trusted publisher
    permissions:
      id-token: write          # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
